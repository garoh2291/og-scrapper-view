<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Link Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #222230;
      --border: #2e2e42;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --text: #f0f0f8;
      --muted: #8888aa;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 40px;
    }

    /* ---- TOP BAR ---- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .topbar input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 13px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .topbar input:focus { border-color: var(--accent); }
    .topbar input::placeholder { color: var(--muted); }

    .topbar button {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 11px 18px;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .topbar button:active { opacity: 0.75; }

    /* ---- TABS ---- */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ---- VIEWS CONTAINER ---- */
    .views { position: relative; }

    .view { display: none; }
    .view.active { display: block; }

    /* ---- LOADING / ERROR ---- */
    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .state .icon { font-size: 40px; margin-bottom: 12px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================
       VIEW 1: OG CARD (Twitter-style)
    ============================ */
    .og-card {
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .og-card:active { transform: scale(0.98); }

    .og-card__image {
      width: 100%;
      aspect-ratio: 1.91 / 1;
      object-fit: cover;
      background: var(--surface2);
      display: block;
    }

    .og-card__image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 48px;
    }

    .og-card__body {
      padding: 14px 16px;
    }

    .og-card__domain {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .og-card__favicon {
      width: 14px; height: 14px;
      border-radius: 3px;
      object-fit: contain;
    }

    .og-card__title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .og-card__desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ============================
       VIEW 2: HERO CARD (Big visual)
    ============================ */
    .hero-card {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      min-height: 420px;
      cursor: pointer;
    }

    .hero-card__bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.45) saturate(1.2);
    }

    .hero-card__blur {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(0px);
      background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.92) 100%);
    }

    .hero-card__content {
      position: relative;
      padding: 24px 20px 28px;
      height: 100%;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .hero-card__badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
      width: fit-content;
    }

    .hero-card__title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .hero-card__desc {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .hero-card__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      color: #111;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      width: fit-content;
    }

    /* ============================
       VIEW 3: LIST / COMPACT
    ============================ */
    .compact-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      display: flex;
      gap: 12px;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .compact-card:active { background: var(--surface2); }

    .compact-card__thumb {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .compact-card__thumb.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .compact-card__info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .compact-card__domain {
      color: var(--accent2);
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .compact-card__title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .compact-card__desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ============================
       VIEW 4: MESSENGER-STYLE
    ============================ */
    .messenger-wrap {
      display: flex;
      justify-content: flex-start;
    }

    .messenger-bubble {
      max-width: 85%;
    }

    .messenger-card {
      background: var(--surface);
      border-radius: 4px 18px 18px 18px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      cursor: pointer;
    }

    .messenger-card__image {
      width: 100%;
      aspect-ratio: 1.91 / 1;
      object-fit: cover;
      background: var(--surface2);
      display: block;
    }

    .messenger-card__body {
      padding: 10px 13px 13px;
      border-left: 3px solid var(--accent);
    }

    .messenger-card__site {
      font-size: 10px;
      color: var(--accent2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .messenger-card__title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .messenger-card__desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .messenger-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      padding-left: 4px;
    }

    /* ============================
       VIEW 5: EMBED IFRAME
    ============================ */
    .embed-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1.5px solid var(--border);
      background: var(--surface);
    }

    .embed-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .embed-dots { display: flex; gap: 5px; }
    .embed-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .embed-url {
      flex: 1;
      background: var(--bg);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .embed-iframe {
      width: 100%;
      height: 500px;
      border: none;
      display: block;
    }

    .embed-blocked {
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      gap: 8px;
      padding: 20px;
      text-align: center;
    }

    .embed-blocked a {
      color: var(--accent2);
      text-decoration: none;
    }

    /* ============================
       VIEW 6: METADATA DUMP
    ============================ */
    .meta-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
    }

    .meta-card__preview {
      position: relative;
      overflow: hidden;
    }

    .meta-card__preview img {
      width: 100%;
      aspect-ratio: 1.91 / 1;
      object-fit: cover;
      display: block;
    }

    .meta-card__rows {
      padding: 4px 0;
    }

    .meta-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .meta-row:last-child { border-bottom: none; }

    .meta-key {
      font-size: 11px;
      color: var(--accent2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 80px;
      padding-top: 1px;
    }

    .meta-val {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-all;
    }

    /* ============================
       OPEN BUTTON (all views)
    ============================ */
    .open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 11px;
      text-decoration: none;
      margin-top: 12px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    .open-btn:active { background: var(--surface2); }
  </style>
</head>
<body>

  <!-- Search bar -->
  <div class="topbar">
    <input type="url" id="urlInput" placeholder="Paste a URL…" value="https://www.kingscross.co.uk/whats-on" />
    <button onclick="load()">Load</button>
  </div>

  <!-- View tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">OG Card</div>
    <div class="tab" onclick="switchTab(1)">Hero</div>
    <div class="tab" onclick="switchTab(2)">Compact</div>
    <div class="tab" onclick="switchTab(3)">Messenger</div>
    <div class="tab" onclick="switchTab(4)">Embed</div>
    <div class="tab" onclick="switchTab(5)">Metadata</div>
  </div>

  <!-- Views -->
  <div class="views">
    <div class="view active" id="view-0"><div class="state"><div class="icon">🔗</div>Enter a URL to preview</div></div>
    <div class="view" id="view-1"></div>
    <div class="view" id="view-2"></div>
    <div class="view" id="view-3"></div>
    <div class="view" id="view-4"></div>
    <div class="view" id="view-5"></div>
  </div>

  <script>
    let currentData = null;
    let activeTab = 0;

    function switchTab(i) {
      document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
      document.querySelectorAll('.view').forEach((v, idx) => v.classList.toggle('active', idx === i));
      activeTab = i;
    }

    function showLoading() {
      for (let i = 0; i < 6; i++) {
        document.getElementById(`view-${i}`).innerHTML = `<div class="state"><div class="spinner"></div>Fetching…</div>`;
      }
    }

    function showError(msg) {
      for (let i = 0; i < 6; i++) {
        document.getElementById(`view-${i}`).innerHTML = `<div class="state"><div class="icon">⚠️</div>${msg}</div>`;
      }
    }

    function imgOrPlaceholder(src, cls, emoji = '🌐') {
      if (src) return `<img class="${cls}" src="${src}" onerror="this.outerHTML='<div class=&quot;${cls} placeholder&quot;>${emoji}</div>'" />`;
      return `<div class="${cls} placeholder">${emoji}</div>`;
    }

    function renderAll(d) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      // VIEW 0 — OG Card
      document.getElementById('view-0').innerHTML = `
        <div class="og-card" onclick="window.open('${d.url}','_blank')">
          ${imgOrPlaceholder(d.image, 'og-card__image', '')}
          <div class="og-card__body">
            <div class="og-card__domain">
              ${d.favicon ? `<img class="og-card__favicon" src="${d.favicon}" onerror="this.remove()" />` : ''}
              ${d.domain}
            </div>
            <div class="og-card__title">${d.title}</div>
            ${d.description ? `<div class="og-card__desc">${d.description}</div>` : ''}
          </div>
        </div>`;

      // VIEW 1 — Hero
      document.getElementById('view-1').innerHTML = `
        <div class="hero-card" onclick="window.open('${d.url}','_blank')">
          <div class="hero-card__bg" style="background-image:url('${d.image}')"></div>
          <div class="hero-card__blur"></div>
          <div class="hero-card__content">
            <div class="hero-card__badge">
              ${d.favicon ? `<img style="width:12px;height:12px;border-radius:2px" src="${d.favicon}" onerror="this.remove()" />` : ''}
              ${d.siteName}
            </div>
            <div class="hero-card__title">${d.title}</div>
            ${d.description ? `<div class="hero-card__desc">${d.description}</div>` : ''}
            <div class="hero-card__cta">
              <span>Open →</span>
            </div>
          </div>
        </div>`;

      // VIEW 2 — Compact
      document.getElementById('view-2').innerHTML = `
        <div class="compact-card" onclick="window.open('${d.url}','_blank')">
          ${imgOrPlaceholder(d.image, 'compact-card__thumb', '🌐')}
          <div class="compact-card__info">
            <div class="compact-card__domain">${d.domain}</div>
            <div class="compact-card__title">${d.title}</div>
            ${d.description ? `<div class="compact-card__desc">${d.description}</div>` : ''}
          </div>
        </div>`;

      // VIEW 3 — Messenger
      document.getElementById('view-3').innerHTML = `
        <div class="messenger-wrap">
          <div class="messenger-bubble">
            <div class="messenger-card" onclick="window.open('${d.url}','_blank')">
              ${d.image ? `<img class="messenger-card__image" src="${d.image}" onerror="this.remove()" />` : ''}
              <div class="messenger-card__body">
                <div class="messenger-card__site">${d.siteName}</div>
                <div class="messenger-card__title">${d.title}</div>
                ${d.description ? `<div class="messenger-card__desc">${d.description}</div>` : ''}
              </div>
            </div>
            <div class="messenger-time">${time}</div>
          </div>
        </div>`;

      // VIEW 4 — Embed
      document.getElementById('view-4').innerHTML = `
        <div class="embed-wrap">
          <div class="embed-header">
            <div class="embed-dots">
              <div class="embed-dot" style="background:#ff5f57"></div>
              <div class="embed-dot" style="background:#febc2e"></div>
              <div class="embed-dot" style="background:#28c840"></div>
            </div>
            <div class="embed-url">${d.url}</div>
          </div>
          ${d.canEmbed
            ? `<iframe class="embed-iframe" src="${d.url}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`
            : `<div class="embed-blocked">
                <span style="font-size:32px">🚫</span>
                <strong>Site blocks embedding</strong>
                <span>This page uses X-Frame-Options or CSP to prevent iframe embedding.</span>
                <a href="${d.url}" target="_blank">Open in browser →</a>
              </div>`
          }
        </div>`;

      // VIEW 5 — Metadata
      const rows = [
        ['Title', d.title],
        ['Description', d.description],
        ['Site', d.siteName],
        ['Domain', d.domain],
        ['Type', d.type],
        ['Image', d.image],
        ['Favicon', d.favicon],
        ['Theme', d.themeColor],
        ['URL', d.url],
      ].filter(([, v]) => v);

      document.getElementById('view-5').innerHTML = `
        <div class="meta-card">
          ${d.image ? `<div class="meta-card__preview"><img src="${d.image}" onerror="this.parentElement.remove()" /></div>` : ''}
          <div class="meta-card__rows">
            ${rows.map(([k, v]) => `
              <div class="meta-row">
                <div class="meta-key">${k}</div>
                <div class="meta-val">${k === 'Theme' ? `<span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${v};vertical-align:middle;margin-right:6px"></span>${v}` : v}</div>
              </div>`).join('')}
          </div>
        </div>
        <a class="open-btn" href="${d.url}" target="_blank">Open in browser ↗</a>`;
    }

    async function load() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;

      showLoading();
      switchTab(activeTab);

      try {
        const res = await fetch(`/api/og?url=${encodeURIComponent(url)}`);
        const data = await res.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        currentData = data;
        renderAll(data);
      } catch (e) {
        showError('Network error — is the server running?');
      }
    }

    // Auto-load on start
    window.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
